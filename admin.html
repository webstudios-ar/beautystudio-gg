<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beautystudio.gg | Panel de Turnos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0C0A09; --dark:#141210; --dark2:#1E1916; --dark3:#2E221E;
  --gold:#C9A96E; --gold-lt:#DEC28D; --cream:#F8F4EE;
  --green:#22C55E; --red:#EF4444; --yellow:#F59E0B;
  --t1:rgba(255,255,255,.90); --t2:rgba(255,255,255,.50);
  --t3:rgba(255,255,255,.28); --t4:rgba(255,255,255,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--black);color:var(--t1);min-height:100vh}

/* LOGIN */
.login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem;
}
.login-box{
  background:var(--dark);border:1px solid rgba(201,169,110,.15);
  padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;
}
.login-logo{
  font-family:'Cormorant Garamond',serif;font-size:1.5rem;
  font-weight:400;color:var(--cream);letter-spacing:.1em;margin-bottom:.4rem;
}
.login-logo span{color:var(--gold)}
.login-sub{font-size:.75rem;color:var(--t3);margin-bottom:2rem;letter-spacing:.05em}
.login-box label{display:block;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);margin-bottom:.4rem;text-align:left}
.login-box input{
  width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,169,110,.15);
  color:var(--cream);padding:.8rem 1rem;font-family:'Outfit',sans-serif;
  font-size:1rem;outline:none;margin-bottom:1rem;
}
.login-box input:focus{border-color:rgba(201,169,110,.45)}
.btn-login{
  width:100%;background:var(--gold);color:var(--black);
  padding:.85rem;font-family:'Outfit',sans-serif;font-size:.75rem;
  letter-spacing:.18em;text-transform:uppercase;font-weight:500;
  border:none;cursor:pointer;transition:background .3s;
}
.btn-login:hover{background:var(--gold-lt)}
.login-error{color:#EF4444;font-size:.75rem;margin-top:.75rem;display:none}

/* PANEL */
.panel{display:none}
.panel-nav{
  position:sticky;top:0;z-index:100;
  background:rgba(12,10,9,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(201,169,110,.1);
  padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
}
.panel-nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--cream);letter-spacing:.08em}
.panel-nav-logo span{color:var(--gold)}
.panel-nav-right{display:flex;align-items:center;gap:1rem}
.badge-count{
  background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);
  color:#F59E0B;padding:.25rem .75rem;font-size:.7rem;letter-spacing:.1em;border-radius:50px;
}
.btn-logout{background:none;border:1px solid rgba(255,255,255,.1);color:var(--t3);padding:.4rem 1rem;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .3s}
.btn-logout:hover{border-color:var(--gold);color:var(--gold)}

.panel-body{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

/* TABS */
.tabs{display:flex;gap:1px;background:rgba(201,169,110,.08);margin-bottom:2rem}
.tab-btn{
  flex:1;padding:.7rem 1rem;background:var(--dark);
  border:none;cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--t3);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.tab-btn.active{background:var(--dark2);color:var(--gold)}
.tab-count{background:rgba(201,169,110,.15);color:var(--gold);padding:.15rem .5rem;border-radius:50px;font-size:.6rem}
.tab-count.red{background:rgba(239,68,68,.15);color:#EF4444}

/* TURNO CARDS */
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:var(--cream);margin-bottom:1.5rem}
.turno-card{
  background:var(--dark);border:1px solid rgba(201,169,110,.1);
  padding:1.4rem 1.5rem;margin-bottom:.8rem;
  display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;
}
.turno-info{}
.turno-nombre{font-size:.95rem;font-weight:500;color:var(--cream);margin-bottom:.3rem}
.turno-meta{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:.5rem}
.turno-badge{
  font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.25rem .6rem;border-radius:2px;
}
.badge-fecha{background:rgba(201,169,110,.1);color:var(--gold)}
.badge-hora{background:rgba(201,169,110,.1);color:var(--gold)}
.badge-srv{background:rgba(255,255,255,.06);color:var(--t2)}
.badge-pendiente{background:rgba(245,158,11,.1);color:#F59E0B}
.badge-aprobado{background:rgba(34,197,94,.1);color:#22C55E}
.badge-rechazado{background:rgba(239,68,68,.1);color:#EF4444}
.turno-tel{font-size:.78rem;color:var(--t3);display:flex;align-items:center;gap:.4rem}
.turno-nota{font-size:.75rem;color:var(--t3);font-style:italic;margin-top:.4rem}

.turno-actions{display:flex;flex-direction:column;gap:.5rem;min-width:120px}
.btn-aprobar{
  background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);
  color:#22C55E;padding:.6rem 1rem;font-size:.7rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;font-family:'Outfit',sans-serif;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.btn-aprobar:hover{background:rgba(34,197,94,.25)}
.btn-rechazar{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  color:#EF4444;padding:.6rem 1rem;font-size:.7rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;font-family:'Outfit',sans-serif;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.btn-rechazar:hover{background:rgba(239,68,68,.2)}
.btn-wpp-cliente{
  background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.2);
  color:#25D366;padding:.6rem 1rem;font-size:.7rem;letter-spacing:.1em;
  text-transform:uppercase;cursor:pointer;font-family:'Outfit',sans-serif;
  text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.4rem;
  transition:all .2s;
}
.btn-wpp-cliente:hover{background:rgba(37,211,102,.2)}

.turno-timestamp{font-size:.6rem;color:var(--t4);margin-top:.5rem}

/* EMPTY STATE */
.empty-state{text-align:center;padding:4rem 2rem}
.empty-state .ico{font-size:3rem;opacity:.2;display:block;margin-bottom:1rem}
.empty-state p{color:var(--t3);font-size:.9rem}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(201,169,110,.08);margin-bottom:2rem}
.stat-card{background:var(--dark2);padding:1.2rem;text-align:center}
.stat-card strong{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;display:block;line-height:1}
.stat-card small{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--t3)}
.stat-pending strong{color:#F59E0B}
.stat-ok strong{color:#22C55E}
.stat-total strong{color:var(--gold)}

/* MODAL APROBAR */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.8);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:1rem;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--dark);border:1px solid rgba(201,169,110,.2);
  padding:2rem;width:100%;max-width:440px;
}
.modal-box h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;color:var(--cream);margin-bottom:.4rem}
.modal-box p{font-size:.82rem;color:var(--t3);margin-bottom:1.5rem}
.modal-detail{background:rgba(255,255,255,.03);border:1px solid rgba(201,169,110,.1);padding:1rem;margin-bottom:1.5rem}
.modal-detail p{font-size:.82rem;color:var(--t2);margin-bottom:.3rem}
.modal-detail strong{color:var(--cream)}
.modal-actions{display:flex;gap:.75rem}
.modal-actions button{flex:1;padding:.8rem;font-family:'Outfit',sans-serif;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:none;transition:all .2s}
.modal-confirm{background:var(--green);color:white}
.modal-confirm:hover{background:#16a34a}
.modal-cancel{background:rgba(255,255,255,.06);color:var(--t2)}
.modal-cancel:hover{background:rgba(255,255,255,.1)}

/* CAL MINI PREVIEW */
.cal-preview{background:var(--dark2);border:1px solid rgba(201,169,110,.1);padding:1.2rem;margin-bottom:2rem}
.cal-preview h4{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:400;color:var(--cream);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.cal-today-slots{display:flex;flex-wrap:wrap;gap:.4rem}
.cal-slot{padding:.35rem .7rem;font-size:.7rem;border-radius:2px}
.slot-libre{background:rgba(34,197,94,.1);color:#22C55E;border:1px solid rgba(34,197,94,.2)}
.slot-ocupado{background:rgba(239,68,68,.08);color:rgba(239,68,68,.6);border:1px solid rgba(239,68,68,.15)}

/* Responsive */
@media(max-width:600px){
  .turno-card{grid-template-columns:1fr}
  .turno-actions{flex-direction:row;flex-wrap:wrap}
  .turno-actions button,.turno-actions a{flex:1;min-width:100px}
  .stats-row{grid-template-columns:1fr}
}

/* ═══ SERVICIOS ═══ */
.srv-admin-card{background:var(--dark);border:1px solid rgba(201,169,110,.12);margin-bottom:1rem;overflow:hidden}
.srv-admin-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;cursor:pointer;user-select:none;transition:background .2s}
.srv-admin-header:hover{background:rgba(201,169,110,.04)}
.srv-admin-header-left{display:flex;align-items:center;gap:1rem}
.srv-admin-ico{font-size:1.4rem}
.srv-admin-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:400;color:var(--cream)}

.srv-admin-precio{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400;color:var(--gold)}
.srv-admin-dur{font-size:.7rem;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}
.srv-ganancia-badge{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:.25rem .65rem;border-radius:2px}

.srv-admin-body.hidden{display:none}
.srv-fields{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-top:1.2rem}
.srv-field label{display:block;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:.4rem}
.srv-field input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,169,110,.15);color:var(--cream);padding:.7rem 1rem;font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
.srv-field input:focus{border-color:rgba(201,169,110,.5)}
.srv-materiales{margin-top:1rem}
.srv-materiales h5{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:.8rem}
.mat-row{display:flex;gap:.6rem;margin-bottom:.5rem;align-items:center}
.mat-row input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(201,169,110,.12);color:var(--cream);padding:.55rem .8rem;font-family:'Outfit',sans-serif;font-size:.85rem;outline:none}
.mat-row input:focus{border-color:rgba(201,169,110,.4)}
.mat-row input.mat-precio{max-width:100px}
.btn-del-mat{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#EF4444;padding:.55rem .7rem;cursor:pointer;font-size:.8rem;transition:background .2s}
.btn-del-mat:hover{background:rgba(239,68,68,.2)}
.btn-add-mat{background:rgba(201,169,110,.08);border:1px solid rgba(201,169,110,.2);color:var(--gold);padding:.55rem 1rem;cursor:pointer;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;font-family:'Outfit',sans-serif;margin-top:.3rem;transition:background .2s}
.btn-add-mat:hover{background:rgba(201,169,110,.15)}
.srv-resumen{margin-top:1.2rem;background:rgba(201,169,110,.06);border:1px solid rgba(201,169,110,.12);padding:1rem 1.2rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}
.srv-resumen-item{text-align:center}
.srv-resumen-item strong{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;display:block;line-height:1.1}
.srv-resumen-item small{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.btn-save-srv{width:100%;margin-top:1rem;background:var(--gold);color:var(--black);border:none;padding:.8rem;font-family:'Outfit',sans-serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background .3s}
.btn-save-srv:hover{background:var(--gold-lt)}
.srv-saved-msg{text-align:center;font-size:.72rem;color:#22C55E;margin-top:.5rem;opacity:0;transition:opacity .3s}

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">beauty<span>studio</span>.gg</div>
    <div class="login-sub">Panel de administración · Turnos</div>
    <label>Contraseña</label>
    <input type="password" id="passInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <nav class="panel-nav">
    <div class="panel-nav-logo">beauty<span>studio</span>.gg · <span style="font-size:.85rem;color:var(--t3)">Turnos</span></div>
    <div class="panel-nav-right">
      <span class="badge-count" id="pendingBadge">0 pendientes</span>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="panel-body">

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card stat-pending">
        <strong id="statPending">0</strong>
        <small>Pendientes</small>
      </div>
      <div class="stat-card stat-ok">
        <strong id="statOk">0</strong>
        <small>Aprobados</small>
      </div>
      <div class="stat-card stat-total">
        <strong id="statTotal">0</strong>
        <small>Total</small>
      </div>
    </div>

    <!-- HORARIOS DE HOY -->
    <div class="cal-preview">
      <h4>📅 Horarios de hoy</h4>
      <div class="cal-today-slots" id="todaySlots">Cargando...</div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('pendientes')" id="tab-pendientes">
        Pendientes <span class="tab-count red" id="cnt-pendientes">0</span>
      </button>
      <button class="tab-btn" onclick="showTab('aprobados')" id="tab-aprobados">
        Aprobados <span class="tab-count" id="cnt-aprobados">0</span>
      </button>
      <button class="tab-btn" onclick="showTab('rechazados')" id="tab-rechazados">
        Rechazados <span class="tab-count" id="cnt-rechazados">0</span>
      </button>
      <button class="tab-btn" onclick="showTab('servicios')" id="tab-servicios">
        ✦ Servicios
      </button>
    </div>

    <!-- LISTAS -->
    <div id="list-pendientes"></div>
    <div id="list-aprobados" style="display:none"></div>
    <div id="list-rechazados" style="display:none"></div>
    <div id="list-servicios" style="display:none"></div>

  </div>
</div>

<!-- MODAL APROBAR -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3 id="modalTitle">Confirmar turno</h3>
    <p id="modalDesc">¿Querés aprobar este turno? Se le enviará una notificación al cliente.</p>
    <div class="modal-detail" id="modalDetail"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-confirm" id="modalConfirmBtn">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  CONFIGURACIÓN — REEMPLAZAR CON DATOS DE FIREBASE
// ═══════════════════════════════════════════════

// ⚠️  IMPORTANTE: Reemplazá estos valores con tu proyecto de Firebase
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB7qOASNuTpw75G9t1Ltqm1_F2ivGfIz3U",
  databaseURL: "https://beautystudio-gg-default-rtdb.firebaseio.com",
  projectId: "beautystudio-gg",
};


const FB_DB = "https://beautystudio-gg-default-rtdb.firebaseio.com";

async function loadFromFirebase() {
  try {
    const resp = await fetch(FB_DB + '/turnos.json');
    const data = await resp.json();
    if (data) {
      Object.values(data).forEach(ft => {
        const idx = turnos.findIndex(t => t.id === ft.id);
        if (idx >= 0) turnos[idx] = ft;
        else turnos.push(ft);
      });
      localStorage.setItem('bgg_admin_turnos', JSON.stringify(turnos));
    }
  } catch(e) { console.log('Firebase load error:', e); }
  renderAll();
  loadTodaySlots();
}

async function checkFirebase() {
  try {
    const resp = await fetch(FB_DB + '/turnos.json');
    const data = await resp.json();
    if (!data) return;
    let hasNew = false;
    Object.values(data).forEach(ft => {
      const existing = turnos.find(t => t.id === ft.id);
      if (!existing) { turnos.push(ft); hasNew = true; }
    });
    if (hasNew) {
      localStorage.setItem('bgg_admin_turnos', JSON.stringify(turnos));
      renderAll(); loadTodaySlots();
    }
  } catch(e) {}
}

function syncSlotsFirebase() {
  const slots = {};
  turnos.filter(t => t.estado === 'aprobado').forEach(t => {
    const key = t.fecha + '_' + t.hora.replace(':','');
    slots[key] = {fecha: t.fecha, hora: t.hora, ts: t.updatedAt || t.timestamp};
  });
  fetch(FB_DB + '/slots_tomados.json', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(Object.keys(slots).length ? slots : null)
  }).catch(e => console.log('slots error:', e));
}

function confirmarAccion(accion, id) {
  const t = turnos.find(x => x.id === id);

  modalAction = accion;
  modalTurnoId = id;

  const isAprobar = accion === 'aprobar';

  document.getElementById('modalDesc').textContent = isAprobar
    ? 'Al aprobar, el horario quedará bloqueado en la web. Podés enviarle WhatsApp al cliente.'

  document.getElementById('modalDetail').innerHTML = `

  const btn = document.getElementById('modalConfirmBtn');

  btn.onclick = ejecutarAccion;

  document.getElementById('modalOverlay').classList.add('open');

function ejecutarAccion() {
  const t = turnos.find(x => x.id === modalTurnoId);
  if (!t) return;

  t.estado = modalAction === 'aprobar' ? 'aprobado' : 'rechazado';
  t.updatedAt = new Date().toISOString();

  saveTurnos();
  renderAll();
  loadTodaySlots();
  closeModal();

  // Si aprueba, abrir Google Calendar con el evento pre-llenado
  if (modalAction === 'aprobar') {
    setTimeout(() => {
      if (confirm('¿Querés agregar este turno a Google Calendar ahora?')) {
        window.open(googleCalendarUrl(t), '_blank');
      }
    }, 300);
  }

  // Opción de enviar WhatsApp al cliente
  setTimeout(() => {
    if (confirm(`¿Enviarle WhatsApp a ${t.nombre} para ${modalAction === 'aprobar' ? 'confirmar' : 'informar el rechazo'}?`)) {
      window.open('https://wa.me/' + limpiarTel(t.telefono) + '?text=' + encodeURIComponent(msgCliente(t, modalAction === 'aprobar' ? 'aprobados' : 'rechazados')), '_blank');

// ═══════════════════════════════════════════════
function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatFecha(ds) {
  if (!ds) return '-';
  const [y,m,d] = ds.split('-').map(Number);
  const fecha = new Date(y, m-1, d);
  return fecha.toLocaleDateString('es-AR', {weekday:'short', day:'numeric', month:'short'});
}

function formatTimestamp(ts) {
  if (!ts) return '-';
  return new Date(ts).toLocaleString('es-AR', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function estadoLabel(e) {
  return {pendiente:'⏳ Pendiente', aprobado:'✓ Aprobado', rechazado:'✕ Rechazado'}[e] || e;
}

function limpiarTel(tel) {
  return tel.replace(/\D/g,'') || '';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function msgCliente(t, tipo) {
  const nombre = t.nombre.split(' ')[0];
  if (tipo === 'aprobados') {
    return `¡Hola ${nombre}! 🌸 Tu turno está *confirmado*.\n\n✅ *${t.servicio}*\n📅 ${formatFecha(t.fecha)}\n🕐 ${t.hora}hs\n\nTe espero en el estudio. Si necesitás cancelar, avisame con anticipación. ✨\n\n— beautystudio.gg`;
  } else {
    return `¡Hola ${nombre}! Te escribo de beautystudio.gg.\n\nLamentablemente no tengo disponibilidad para el *${formatFecha(t.fecha)} a las ${t.hora}hs*.\n\n¿Querés que coordinemos otro día y horario? 🌸`;
  }
}

function googleCalendarUrl(t) {
  const [y,m,d] = t.fecha.split('-').map(Number);
  const [h,min] = t.hora.split(':').map(Number);
  const start = new Date(y,m-1,d,h,min||0);
  const end = new Date(start.getTime() + 90*60*1000); // +90min por defecto

  const fmt = dt => dt.toISOString().replace(/[-:]/g,'').split('.')[0] + 'Z';

  return `https://calendar.google.com/calendar/render?action=TEMPLATE`
    + `&text=${encodeURIComponent(t.servicio + ' — ' + t.nombre)}`
    + `&dates=${fmt(start)}/${fmt(end)}`
    + `&details=${encodeURIComponent('📱 ' + t.telefono + (t.nota ? '\n📝 ' + t.nota : '') + '\n\nTurno via beautystudio.gg')}`
    + `&location=${encodeURIComponent('Vicente López, Buenos Aires')}`;
}

function checkNewRequests() {
  const queue = JSON.parse(localStorage.getItem('bgg_queue') || '[]');
  if (queue.length > 0) {
    queue.forEach(req => {
      if (!turnos.find(t => t.id === req.id)) {
        turnos.push({ ...req, estado: 'pendiente', timestamp: req.timestamp || new Date().toISOString() });
      }
    });
    localStorage.setItem('bgg_queue', '[]');
    saveTurnos();
    renderAll();
    loadTodaySlots();
  }
}

  srv.materiales.push({nombre:'',costo:0});
  var c=document.getElementById('mats-'+srvId);
  var d=document.createElement('div');d.className='mat-row';
  d.innerHTML='<input type="text" placeholder="Material" oninput="updateMaterial(''+srvId+'','+idx+','nombre',this.value)" style="flex:2"><input type="number" placeholder="$ Costo" min="0" step="0.01" class="mat-precio" oninput="updateMaterial(''+srvId+'','+idx+','costo',this.value)"><button class="btn-del-mat" onclick="deleteMaterial(''+srvId+'','+idx+')">&#x2715;</button>';
  c.appendChild(d);d.querySelector('input').focus();
}
function updateMaterial(srvId,idx,campo,val){
  var srv=servicios.find(function(s){return s.id===srvId;});if(!srv||!srv.materiales[idx])return;
  srv.materiales[idx][campo]=(campo==='costo')?parseFloat(val)||0:val;
  actualizarResumen(srvId);
}
function deleteMaterial(srvId,idx){
  var srv=servicios.find(function(s){return s.id===srvId;});if(!srv)return;
  srv.materiales.splice(idx,1);
  var card=document.getElementById('card-srv-'+srvId);
  var wasOpen=card&&!card.querySelector('.srv-admin-body').classList.contains('hidden');
  card.outerHTML=renderSrvCard(srv);
  if(wasOpen)document.getElementById('body-'+srvId).classList.remove('hidden');
}
function guardarServicio(id){
  saveServicios();
  var msg=document.getElementById('saved-'+id);
  if(msg){msg.style.opacity='1';setTimeout(function(){msg.style.opacity='0';},2500);}
}
function showTab(tipo){
  ['pendientes','aprobados','rechazados','servicios'].forEach(function(t){
    var l=document.getElementById('list-'+t);var b=document.getElementById('tab-'+t);
    if(l)l.style.display=t===tipo?'block':'none';
    if(b)b.classList.toggle('active',t===tipo);
  });
  if(tipo==='servicios')renderServicios();
}
loadServiciosFirebase();
</script>
</body>
</html>
